name: Data Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-check-programming-ddl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Validate data schema
        run: node scripts/validate-data.mjs
      - name: Crawl sources
        run: node scripts/crawl-sources.mjs --write-report
      - name: Link check
        run: node scripts/link-check.mjs
        env:
          STRICT_LINK_CHECK: 'false'
          REQUIRE_DETAIL_URLS: 'false'
      - name: Upload crawler report
        uses: actions/upload-artifact@v7
        with:
          name: crawler-report
          path: reports/*.json
          if-no-files-found: error
